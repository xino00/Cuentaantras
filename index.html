<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiempo para vernos!!!!</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💖</text></svg>">
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Audio para música sorpresa -->
    <audio id="bg-music" src="The Vaccines - I Always Knew [1yJVj-mJROA].mp3" loop></audio>

    <div id="start-overlay" class="overlay" tabindex="0" role="button" aria-label="Iniciar">
        <h2>Toca la pantalla para una sorpresa mágica ✨</h2>
    </div>

    <div id="particles-container"></div>

    <div class="container glass-panel">
        <h1 class="title">Tiempo para vernos!!!!</h1>
        <div class="countdown" id="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <span class="label">Días</span>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <span class="label">Minutos</span>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>
        <div class="progress-wrapper">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p class="progress-text" id="progress-text"></p>
        <p class="subtitle" id="message">La espera valdrá la pena...</p>
        <p class="fun-counter" id="fun-counter"></p>
    </div>
    <div id="secret-message" class="secret-message">
        <p>Irene, eres lo mejor que me ha pasado. Cada segundo sin verte es un segundo que me acerca a ti.</p>
    </div>
    <div id="hearts-container"></div>
    <script src="script.js"></script>
</body>
</html>
